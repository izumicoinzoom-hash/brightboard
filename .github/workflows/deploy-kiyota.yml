name: Deploy BrightBoard (kiyota) to Xserver via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy to Xserver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Deploy via FTP to Xserver
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.XSERVER_FTP_HOST }}
          username: ${{ secrets.XSERVER_FTP_USER }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          protocol: ftps
          local-dir: dist/
          server-dir: public_html/kiyota/
          dangerous-clean-slate: true

